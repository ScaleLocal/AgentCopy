<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AgentCopyAI</title>
  <script>
    var l = window.location;
    var path = l.pathname;
    var search = l.search;
    var hash = l.hash;

    if (path === '/site-agent' || path === '/site-agent/' || path.startsWith('/site-agent/')) {
      var slug = path.replace(/^\/site-agent\/?/, '');
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/site-agent.html?/' + (slug ? 'site-agent/' + slug : 'site-agent') +
        (search ? '&' + search.slice(1).replace(/&/g, '~and~') : '') + hash
      );
    } else if (path === '/frame' || path === '/frame/') {
      // frame.html is served directly — redirect with query string intact
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/frame.html' + search + hash
      );
    } else {
      var pathSegmentsToKeep = 0;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (search ? '&' + search.slice(1).replace(/&/g, '~and~') : '') + hash
      );
    }
  </script>
</head>
<body></body>
</html>
