<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AgentCopyAI</title>
  <script>
    var l = window.location;
    var path = l.pathname;

    // Route /site-agent/* to site-agent.html
    if (path === '/site-agent' || path === '/site-agent/' || path.startsWith('/site-agent/')) {
      var slug = path.replace(/^\/site-agent\/?/, '');
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/site-agent.html?/' + (slug ? 'site-agent/' + slug : 'site-agent') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    } else {
      // All other routes -> index.html SPA
      var pathSegmentsToKeep = 0;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    }
  </script>
</head>
<body></body>
</html>
