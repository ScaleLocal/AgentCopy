<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agent Frame</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:#fff;}

    /* Business site fills entire frame — no border, no outline */
    #biz-frame{
      position:absolute;
      top:0;left:0;right:0;bottom:0;
      width:100%;height:100%;
      border:none;
      outline:none;
      z-index:1;
      background:#fff;
    }

    /* Loading overlay */
    #loader{
      position:absolute;inset:0;
      background:#f5f5f5;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:12px;z-index:50;
      transition:opacity .3s ease;
    }
    #loader.gone{opacity:0;pointer-events:none;}
    .loader-dot{
      width:10px;height:10px;border-radius:50%;background:#0D9488;
      animation:ldot 1.2s ease-in-out infinite;
    }
    .loader-dot:nth-child(2){animation-delay:.2s;}
    .loader-dot:nth-child(3){animation-delay:.4s;}
    .loader-dots{display:flex;gap:8px;}
    .loader-text{font-family:system-ui,sans-serif;font-size:13px;color:#888;}
    @keyframes ldot{0%,80%,100%{transform:scale(0.7);opacity:.5}40%{transform:scale(1);opacity:1}}

    /* Blocked site fallback */
    #blocked{
      display:none;position:absolute;inset:0;
      background:linear-gradient(135deg,#F5F3EF 0%,#fff 100%);
      align-items:center;justify-content:center;flex-direction:column;
      gap:16px;text-align:center;padding:32px;z-index:60;
    }
    #blocked.show{display:flex;}
    #blocked .logo{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#0D9488,#2563EB);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;font-family:Georgia,serif;}
    #blocked .bname{font-family:Georgia,serif;font-size:1.3rem;color:#0C0A09;}
    #blocked .msg{font-size:.8rem;color:#A8A29E;max-width:220px;line-height:1.5;}
    #blocked .badge{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:100px;background:#F0FDF4;border:1px solid #BBF7D0;font-size:.72rem;font-weight:600;color:#16A34A;}
    #blocked .badge span{width:5px;height:5px;border-radius:50%;background:#16A34A;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* ── Keep GHL widget launcher visible within the phone screen ──
       The iframe renders at 393×814px but the phone only shows ~500px of height.
       GHL places its launcher at position:fixed bottom:16px which maps to
       ~798px from the top — below the visible clipped area.
       We override to keep it in the top ~460px of the iframe viewport,
       which corresponds to the bottom of the visible phone screen. */
    chat-widget {
      position: fixed !important;
      bottom: 16px !important;
      right: 16px !important;
      max-height: 460px !important;
    }
    /* Force the entire widget container to stay within visible bounds */
    #lc_text-widget,
    [id*="lc_text-widget"],
    [class*="lc_text-widget"] {
      bottom: 16px !important;
      max-height: 440px !important;
    }
  </style>
</head>
<body>

<div id="loader">
  <div class="loader-dots">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
  <div class="loader-text" id="loader-text">Loading your website...</div>
</div>

<div id="blocked">
  <div class="logo" id="bl-initial">?</div>
  <div class="bname" id="bl-name">Your Business</div>
  <div class="msg">Website preview restricted by browser security — but your AI agent is fully trained and ready to talk.</div>
  <div class="badge"><span></span> AI agent active</div>
</div>

<iframe id="biz-frame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>

<!-- Clear any stale GHL chat history so every visitor sees a fresh greeting -->
<script>
(function(){
  try {
    // GHL stores conversation state in localStorage under these key patterns
    var keysToNuke = [];
    for(var i=0; i<localStorage.length; i++){
      var k = localStorage.key(i);
      if(k && (
        k.indexOf('lc_') === 0 ||
        k.indexOf('leadconnector') !== -1 ||
        k.indexOf('msgsndr') !== -1 ||
        k.indexOf('chat_') === 0 ||
        k.indexOf('widget_') === 0 ||
        k.indexOf('conversation') !== -1 ||
        k.indexOf('contact_id') !== -1 ||
        k.indexOf('session') !== -1
      )){
        keysToNuke.push(k);
      }
    }
    keysToNuke.forEach(function(k){ localStorage.removeItem(k); });

    // Also clear sessionStorage GHL keys
    var sKeysToNuke = [];
    for(var i=0; i<sessionStorage.length; i++){
      var k = sessionStorage.key(i);
      if(k && (k.indexOf('lc_') === 0 || k.indexOf('leadconnector') !== -1 || k.indexOf('chat') !== -1)){
        sKeysToNuke.push(k);
      }
    }
    sKeysToNuke.forEach(function(k){ sessionStorage.removeItem(k); });
  } catch(e) {}
})();
</script>

<!-- GHL Chat Widget — lives HERE inside the phone frame -->
<script
  src="https://beta.leadconnectorhq.com/loader.js"
  data-resources-url="https://beta.leadconnectorhq.com/chat-widget/loader.js"
  data-widget-id="69c34fd013ad14bdd250aace"
></script>

<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var url    = params.get('url') || '';
  var name   = params.get('name') || 'Your Business';

  // Populate fallback
  document.getElementById('bl-initial').textContent = name.charAt(0).toUpperCase();
  document.getElementById('bl-name').textContent = name;
  document.getElementById('loader-text').textContent = 'Loading ' + name + '...';

  var loader  = document.getElementById('loader');
  var blocked = document.getElementById('blocked');
  var iframe  = document.getElementById('biz-frame');

  if(!url){ showBlocked(); return; }

  // Timeout — if site doesn't load in 6s, show fallback
  var timer = setTimeout(showBlocked, 6000);

  iframe.onload = function(){
    try {
      // Try to read doc — throws if X-Frame blocked
      var doc = iframe.contentDocument || iframe.contentWindow.document;
      if(!doc || !doc.body || doc.body.innerHTML === ''){
        clearTimeout(timer); showBlocked(); return;
      }
      // Scroll to top of loaded page
      try{ iframe.contentWindow.scrollTo(0,0); }catch(e){}
    } catch(e) {
      // Cross-origin = actually loaded fine, not blocked
    }
    clearTimeout(timer);
    hideLoader();
  };

  iframe.onerror = function(){ clearTimeout(timer); showBlocked(); };

  // Use server-side proxy to bypass X-Frame-Options/CSP on all sites
  var fullUrl = url.startsWith('http') ? url : 'https://' + url;
  var proxyUrl = 'https://agentcopy-api.vercel.app/api/proxy?url=' + encodeURIComponent(fullUrl);
  iframe.src = proxyUrl;

  function hideLoader(){
    loader.classList.add('gone');
    setTimeout(function(){ loader.style.display='none'; }, 350);
    // Auto-open chat widget after site loads
    autoOpenWidget();
  }

  function showBlocked(){
    loader.style.display='none';
    blocked.classList.add('show');
    autoOpenWidget();
  }

  // Auto-open the GHL widget bubble after load
  function autoOpenWidget(){
    var attempts = 0;
    var poll = setInterval(function(){
      attempts++;
      var chatEl = document.querySelector('chat-widget');
      if(chatEl && chatEl.shadowRoot){
        var btn = chatEl.shadowRoot.querySelector('button#lc_text-widget--btn, button[id*="btn"], button[class*="launcher"], button[class*="bubble"]');
        if(btn && !btn.classList.contains('active')){
          setTimeout(function(){ btn.click(); }, 1500);
          clearInterval(poll);
          return;
        }
      }
      // Fallback: find any fixed launcher in DOM
      var all = document.querySelectorAll('button,div[role="button"]');
      for(var i=all.length-1;i>=0;i--){
        var cs = window.getComputedStyle(all[i]);
        if(cs.position==='fixed' && parseInt(cs.zIndex)>500){
          setTimeout(function(el){ el.click(); }, 1500, all[i]);
          clearInterval(poll);
          return;
        }
      }
      if(attempts > 30) clearInterval(poll);
    }, 300);
  }

  // Keep widget launcher anchored within visible phone screen area.
  // GHL uses position:fixed which is relative to the iframe viewport (814px tall).
  // The phone only shows ~500px. We watch for the minimized state and
  // reposition the launcher to stay within the visible zone.
  function watchWidgetPosition(){
    var watchAttempts = 0;
    var watcher = setInterval(function(){
      watchAttempts++;
      var chatEl = document.querySelector('chat-widget');
      if(!chatEl || !chatEl.shadowRoot){ if(watchAttempts>60) clearInterval(watcher); return; }
      clearInterval(watcher);

      // Override widget container position via style attribute
      // so the bubble stays in the bottom-right of the VISIBLE screen
      chatEl.style.cssText = 'position:fixed!important;bottom:16px!important;right:16px!important;z-index:9999!important;';

      // Watch for collapse/expand to keep repositioned
      var observer = new MutationObserver(function(){
        chatEl.style.cssText = 'position:fixed!important;bottom:16px!important;right:16px!important;z-index:9999!important;';
        // Also try to constrain inner widget box height so it doesn't overflow
        var box = chatEl.shadowRoot.querySelector('#lc_text-widget, [id*="lc_text-widget"]');
        if(box) box.style.cssText = (box.getAttribute('style')||'') + ';max-height:440px!important;bottom:16px!important;';
      });
      observer.observe(chatEl, {attributes:true, childList:true, subtree:true});
    }, 200);
  }
  watchWidgetPosition();
})();
</script>
</body>
</html>
