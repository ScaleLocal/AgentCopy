<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <!-- Subtle page background -->
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F3EF"/>
      <stop offset="100%" stop-color="#FAFAF9"/>
    </linearGradient>
    <!-- ScaleLocal navy gradient for hero -->
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2e4a"/>
      <stop offset="100%" stop-color="#0f1e33"/>
    </linearGradient>
    <!-- GHL widget header gradient -->
    <linearGradient id="widgetHeader" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <!-- Laptop screen glare -->
    <linearGradient id="screenGlare" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.14)"/>
    </filter>
    <filter id="widgetShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.22)"/>
    </filter>
    <!-- Clip paths -->
    <clipPath id="laptopScreen">
      <rect x="68" y="40" width="494" height="314" rx="4"/>
    </clipPath>
    <clipPath id="phoneScreen">
      <rect x="668" y="38" width="216" height="424" rx="2"/>
    </clipPath>
    <!-- Avatar circle clip -->
    <clipPath id="avatarClip1"><circle cx="15" cy="15" r="13"/></clipPath>
    <clipPath id="avatarClip2"><circle cx="15" cy="15" r="13"/></clipPath>
  </defs>

  <!-- ═══════════════════════════════════════
       LAPTOP
  ═══════════════════════════════════════ -->

  <!-- Laptop body / lid -->
  <g filter="url(#shadow)">
    <!-- Lid outer -->
    <rect x="56" y="28" width="518" height="338" rx="12" fill="#2a2a2a"/>
    <!-- Lid inner bezel -->
    <rect x="62" y="34" width="506" height="326" rx="8" fill="#1a1a1a"/>
    <!-- Screen area -->
    <rect x="68" y="40" width="494" height="314" rx="4" fill="#f8f8f8"/>
  </g>

  <!-- Screen glare overlay -->
  <rect x="68" y="40" width="494" height="314" rx="4" fill="url(#screenGlare)" clip-path="url(#laptopScreen)"/>

  <!-- ── ScaleLocal website in laptop screen ── -->
  <g clip-path="url(#laptopScreen)">
    <!-- Browser chrome -->
    <rect x="68" y="40" width="494" height="28" fill="#f0f0f0"/>
    <rect x="68" y="68" width="494" height="1" fill="#ddd"/>
    <!-- Browser dots -->
    <circle cx="84" cy="54" r="5" fill="#ff5f57"/>
    <circle cx="100" cy="54" r="5" fill="#febc2e"/>
    <circle cx="116" cy="54" r="5" fill="#28c840"/>
    <!-- URL bar -->
    <rect x="160" y="45" width="220" height="18" rx="9" fill="#e8e8e8"/>
    <text x="270" y="57.5" text-anchor="middle" font-size="8.5" fill="#666" font-family="system-ui">🔒 scalelocal.net</text>

    <!-- Website content area -->
    <rect x="68" y="69" width="494" height="285" fill="#ffffff"/>

    <!-- ScaleLocal nav bar -->
    <rect x="68" y="69" width="494" height="36" fill="#1a2e4a"/>
    <!-- Logo text in nav -->
    <text x="92" y="92" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui">Scale<tspan fill="#2ecc71">Local</tspan></text>
    <!-- Nav items -->
    <text x="200" y="91" font-size="8.5" fill="rgba(255,255,255,0.75)">Services</text>
    <text x="248" y="91" font-size="8.5" fill="rgba(255,255,255,0.75)">About</text>
    <text x="290" y="91" font-size="8.5" fill="rgba(255,255,255,0.75)">Results</text>
    <text x="335" y="91" font-size="8.5" fill="rgba(255,255,255,0.75)">Contact</text>
    <!-- CTA button in nav -->
    <rect x="496" y="78" width="54" height="18" rx="9" fill="#2ecc71"/>
    <text x="523" y="90" text-anchor="middle" font-size="7.5" font-weight="600" fill="#1a2e4a">Get Started</text>

    <!-- Hero section -->
    <rect x="68" y="105" width="494" height="140" fill="url(#heroGrad)"/>
    <!-- Hero text -->
    <text x="178" y="140" font-size="13" font-weight="700" fill="#ffffff">Right now, someone in your town</text>
    <text x="178" y="156" font-size="13" font-weight="700" fill="#ffffff">is searching for exactly what</text>
    <text x="178" y="172" font-size="13" font-weight="700" fill="#ffffff">you offer.</text>
    <text x="178" y="192" font-size="9.5" fill="#2ecc71" font-weight="600">Are they finding you — or your competitor?</text>
    <!-- Hero subtext -->
    <text x="178" y="212" font-size="8" fill="rgba(255,255,255,0.65)">Serving RI, MA &amp; NH · Performance Guaranteed</text>
    <!-- Hero image area -->
    <rect x="68" y="105" width="105" height="140" fill="rgba(0,0,0,0.15)"/>
    <text x="120" y="182" text-anchor="middle" font-size="28" fill="rgba(255,255,255,0.12)">🏠</text>

    <!-- Services row -->
    <rect x="68" y="245" width="494" height="109" fill="#f8f9fb"/>
    <text x="315" y="265" text-anchor="middle" font-size="9" font-weight="700" fill="#1a2e4a" text-transform="uppercase">WHAT WE DO FOR LOCAL BUSINESSES</text>
    <!-- Service cards -->
    <rect x="82" y="272" width="110" height="68" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="137" y="297" text-anchor="middle" font-size="14">📍</text>
    <text x="137" y="313" text-anchor="middle" font-size="8" font-weight="600" fill="#1a2e4a">Google Rankings</text>
    <text x="137" y="326" text-anchor="middle" font-size="7" fill="#6b7a8d">Show up first locally</text>

    <rect x="202" y="272" width="110" height="68" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="257" y="297" text-anchor="middle" font-size="14">⭐</text>
    <text x="257" y="313" text-anchor="middle" font-size="8" font-weight="600" fill="#1a2e4a">Reputation Mgmt</text>
    <text x="257" y="326" text-anchor="middle" font-size="7" fill="#6b7a8d">More 5-star reviews</text>

    <rect x="322" y="272" width="110" height="68" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="377" y="297" text-anchor="middle" font-size="14">🤖</text>
    <text x="377" y="313" text-anchor="middle" font-size="8" font-weight="600" fill="#1a2e4a">AI Website Agent</text>
    <text x="377" y="326" text-anchor="middle" font-size="7" fill="#6b7a8d">24/7 lead capture</text>

    <rect x="442" y="272" width="110" height="68" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="497" y="297" text-anchor="middle" font-size="14">📊</text>
    <text x="497" y="313" text-anchor="middle" font-size="8" font-weight="600" fill="#1a2e4a">Paid Advertising</text>
    <text x="497" y="326" text-anchor="middle" font-size="7" fill="#6b7a8d">Google &amp; Meta ads</text>

    <!-- ── GHL VOICE WIDGET — open in laptop ── -->
    <!-- Widget container -->
    <g filter="url(#widgetShadow)">
      <!-- Widget panel -->
      <rect x="398" y="154" width="154" height="192" rx="14" fill="#ffffff"/>

      <!-- Widget header - blue GHL style -->
      <rect x="398" y="154" width="154" height="52" rx="14" fill="url(#widgetHeader)"/>
      <rect x="398" y="168" width="154" height="24" fill="url(#widgetHeader)"/>
      <!-- Agent avatar circle in widget -->
      <circle cx="418" cy="174" r="13" fill="rgba(255,255,255,0.25)"/>
      <text x="418" y="179" text-anchor="middle" font-size="13">👩</text>
      <!-- Widget title -->
      <text x="437" y="169" font-size="9" font-weight="600" fill="#ffffff">ScaleLocal</text>
      <text x="437" y="181" font-size="7.5" fill="rgba(255,255,255,0.8)">Jess · AI Voice Agent</text>
      <!-- Chevron / minimize -->
      <text x="540" y="176" font-size="10" fill="rgba(255,255,255,0.7)">⌄</text>

      <!-- Voice state area -->
      <rect x="398" y="206" width="154" height="140" rx="0" fill="#f8f9fb"/>

      <!-- Voice active indicator -->
      <circle cx="475" cy="242" r="22" fill="rgba(30,64,175,0.08)"/>
      <circle cx="475" cy="242" r="15" fill="rgba(30,64,175,0.12)"/>
      <circle cx="475" cy="242" r="10" fill="#1e40af"/>
      <text x="475" y="247" text-anchor="middle" font-size="11" fill="white">🎙</text>

      <!-- Sound wave bars -->
      <rect x="450" y="268" width="4" height="8" rx="2" fill="#1e40af" opacity="0.4"/>
      <rect x="457" y="264" width="4" height="16" rx="2" fill="#1e40af" opacity="0.6"/>
      <rect x="464" y="261" width="4" height="22" rx="2" fill="#1e40af" opacity="0.9"/>
      <rect x="471" y="258" width="4" height="28" rx="2" fill="#1e40af"/>
      <rect x="478" y="261" width="4" height="22" rx="2" fill="#1e40af" opacity="0.9"/>
      <rect x="485" y="264" width="4" height="16" rx="2" fill="#1e40af" opacity="0.6"/>
      <rect x="492" y="268" width="4" height="8" rx="2" fill="#1e40af" opacity="0.4"/>

      <text x="475" y="305" text-anchor="middle" font-size="8" fill="#6b7a8d">Listening...</text>

      <!-- Widget footer -->
      <rect x="398" y="330" width="154" height="16" rx="14" fill="#f0f0f0"/>
      <rect x="398" y="324" width="154" height="22" rx="0" fill="#f0f0f0"/>
      <rect x="398" y="324" width="154" height="22" rx="14" fill="#f0f0f0"/>
      <text x="475" y="339" text-anchor="middle" font-size="7" fill="#aaa">Powered by ScaleLocal</text>

      <!-- Launcher bubble (minimized state peek) -->
      <circle cx="540" cy="346" r="16" fill="url(#widgetHeader)" filter="url(#shadowSm)"/>
      <text x="540" y="351" text-anchor="middle" font-size="13">💬</text>
    </g>
  </g>

  <!-- Laptop base / keyboard -->
  <g filter="url(#shadowSm)">
    <rect x="42" y="366" width="546" height="22" rx="4" fill="#2a2a2a"/>
    <!-- Keyboard detail lines -->
    <rect x="56" y="370" width="518" height="14" rx="2" fill="#222"/>
    <!-- Trackpad -->
    <rect x="240" y="372" width="150" height="9" rx="3" fill="#333"/>
    <!-- Hinge shadow -->
    <rect x="42" y="363" width="546" height="6" rx="2" fill="#1a1a1a"/>
  </g>
  <!-- Base shadow -->
  <ellipse cx="315" cy="392" rx="250" ry="8" fill="rgba(0,0,0,0.12)"/>

  <!-- ═══════════════════════════════════════
       PHONE
  ═══════════════════════════════════════ -->

  <!-- Phone body -->
  <g filter="url(#shadow)">
    <!-- Outer frame -->
    <rect x="652" y="18" width="250" height="490" rx="36" fill="#1a1a1a"/>
    <!-- Inner bezel -->
    <rect x="658" y="24" width="238" height="478" rx="32" fill="#111"/>
    <!-- Screen -->
    <rect x="664" y="30" width="226" height="456" rx="28" fill="#f8f8f8"/>
  </g>

  <!-- Screen glare on phone -->
  <rect x="664" y="30" width="226" height="456" rx="28" fill="url(#screenGlare)" clip-path="url(#phoneScreen)"/>

  <!-- Dynamic island -->
  <rect x="737" y="42" width="82" height="24" rx="12" fill="#000"/>

  <!-- Side buttons -->
  <rect x="650" y="110" width="4" height="28" rx="2" fill="#2a2a2a"/>
  <rect x="650" y="148" width="4" height="48" rx="2" fill="#2a2a2a"/>
  <rect x="900" y="130" width="4" height="64" rx="2" fill="#2a2a2a"/>

  <!-- Home indicator -->
  <rect x="733" y="472" width="90" height="4" rx="2" fill="rgba(0,0,0,0.2)"/>

  <!-- ── ScaleLocal website in phone ── -->
  <g clip-path="url(#phoneScreen)">
    <!-- Status bar -->
    <rect x="664" y="30" width="226" height="28" fill="#1a2e4a"/>
    <text x="680" y="48" font-size="8.5" font-weight="600" fill="white">9:41</text>
    <text x="856" y="48" text-anchor="end" font-size="8" fill="white">●●●● ▲ ■</text>

    <!-- Nav bar -->
    <rect x="664" y="58" width="226" height="30" fill="#1a2e4a"/>
    <text x="680" y="78" font-size="11" font-weight="700" fill="#ffffff">Scale<tspan fill="#2ecc71">Local</tspan></text>
    <!-- Hamburger menu -->
    <line x1="858" y1="68" x2="874" y2="68" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="858" y1="74" x2="874" y2="74" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="858" y1="80" x2="874" y2="80" stroke="white" stroke-width="2" stroke-linecap="round"/>

    <!-- Hero section phone -->
    <rect x="664" y="88" width="226" height="120" fill="url(#heroGrad)"/>
    <text x="777" y="117" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">Right now, someone in</text>
    <text x="777" y="131" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">your town is searching</text>
    <text x="777" y="145" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">for what you offer.</text>
    <text x="777" y="163" text-anchor="middle" font-size="8.5" fill="#2ecc71" font-weight="600">Are they finding you?</text>
    <!-- Serving line -->
    <text x="777" y="198" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.55)">Serving RI · MA · NH</text>

    <!-- Content below hero -->
    <rect x="664" y="208" width="226" height="280" fill="#f8f9fb"/>
    <!-- Cards stacked on mobile -->
    <rect x="676" y="218" width="202" height="48" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="696" y="242" font-size="16">📍</text>
    <text x="720" y="239" font-size="9" font-weight="600" fill="#1a2e4a">Google Rankings</text>
    <text x="720" y="253" font-size="7.5" fill="#6b7a8d">Show up first in your city</text>

    <rect x="676" y="272" width="202" height="48" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="696" y="296" font-size="16">🤖</text>
    <text x="720" y="293" font-size="9" font-weight="600" fill="#1a2e4a">AI Website Agent</text>
    <text x="720" y="307" font-size="7.5" fill="#6b7a8d">24/7 lead capture &amp; chat</text>

    <rect x="676" y="326" width="202" height="48" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="696" y="350" font-size="16">⭐</text>
    <text x="720" y="347" font-size="9" font-weight="600" fill="#1a2e4a">Reputation Management</text>
    <text x="720" y="361" font-size="7.5" fill="#6b7a8d">More 5-star reviews, faster</text>

    <!-- ── GHL CHAT WIDGET — open on phone ── -->
    <g filter="url(#widgetShadow)">
      <!-- Widget panel -->
      <rect x="664" y="268" width="226" height="218" rx="0" fill="#ffffff"/>

      <!-- Widget header -->
      <rect x="664" y="268" width="226" height="52" fill="url(#widgetHeader)"/>
      <!-- Agent avatar -->
      <circle cx="688" cy="289" r="14" fill="rgba(255,255,255,0.25)"/>
      <text x="688" y="295" text-anchor="middle" font-size="14">👩</text>
      <!-- Widget title -->
      <text x="708" y="284" font-size="9.5" font-weight="600" fill="#ffffff">ScaleLocal</text>
      <text x="708" y="297" font-size="8" fill="rgba(255,255,255,0.8)">Jess · AI Assistant</text>
      <!-- Online dot -->
      <circle cx="703" cy="304" r="4" fill="#2ecc71"/>
      <!-- Chevron -->
      <text x="875" y="293" font-size="12" fill="rgba(255,255,255,0.7)">⌄</text>

      <!-- Chat messages area -->
      <rect x="664" y="320" width="226" height="148" fill="#f8f9fb"/>

      <!-- Agent greeting bubble -->
      <rect x="672" y="328" width="168" height="38" rx="10" rx="10" fill="#e8f0fe"/>
      <text x="682" y="342" font-size="7.5" fill="#1a2e4a">Hi, I'm Jess with ScaleLocal</text>
      <text x="682" y="354" font-size="7.5" fill="#1a2e4a">— how can I assist you today?</text>
      <!-- Timestamp -->
      <text x="682" y="370" font-size="6.5" fill="#aaa">9:41 AM</text>

      <!-- User bubble (right aligned) -->
      <rect x="746" y="376" width="136" height="26" rx="10" fill="#1e40af"/>
      <text x="760" y="393" font-size="7.5" fill="#ffffff">Do you service clients in</text>
      <text x="760" y="405" font-size="7.5" fill="#ffffff">Andover, MA?</text>
      <!-- Adjusted for text overflow -->
      <rect x="730" y="374" width="152" height="38" rx="10" fill="#1e40af"/>
      <text x="742" y="388" font-size="7.5" fill="#ffffff">Do you service clients</text>
      <text x="742" y="400" font-size="7.5" fill="#ffffff">in Andover, MA?</text>

      <!-- Agent response bubble -->
      <rect x="672" y="416" width="185" height="40" rx="10" fill="#e8f0fe"/>
      <text x="682" y="430" font-size="7.5" fill="#1a2e4a">Of course, Andover is a fantastic</text>
      <text x="682" y="442" font-size="7.5" fill="#1a2e4a">area where we help many clients.</text>

      <!-- Input bar -->
      <rect x="664" y="460" width="226" height="26" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <rect x="669" y="463" width="176" height="20" rx="10" fill="#f3f4f6"/>
      <text x="682" y="476" font-size="7.5" fill="#aaa">Type a message...</text>
      <!-- Send button -->
      <circle cx="874" cy="473" r="10" fill="#1e40af"/>
      <text x="874" y="477" text-anchor="middle" font-size="9" fill="white">➤</text>
    </g>
  </g>

  <!-- Phone shadow -->
  <ellipse cx="777" cy="515" rx="100" ry="7" fill="rgba(0,0,0,0.12)"/>

  <!-- Optional: subtle label beneath each device -->
  <text x="315" y="416" text-anchor="middle" font-size="10" fill="#A8A29E" font-weight="500">Desktop Experience</text>
  <text x="777" y="528" text-anchor="middle" font-size="10" fill="#A8A29E" font-weight="500">Mobile Experience</text>
</svg>
